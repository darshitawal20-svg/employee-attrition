<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttritionIQ — Employee Attrition Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* (KEEP ALL YOUR ORIGINAL CSS HERE) */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #07080d; --bg2: #0d0f18; --surface: #111527; --surface2: #161a2e;
            --border: rgba(99,120,255,0.12); --border2: rgba(99,120,255,0.22);
            --accent: #6378ff; --accent-glow: rgba(99,120,255,0.35);
            --green: #10d48e; --green-dim: rgba(16,212,142,0.12);
            --red: #ff4d6d; --red-dim: rgba(255,77,109,0.12);
            --text: #e8ecff; --text2: #8892b0; --text3: #4a5280;
            --radius: 16px; --radius-sm: 10px;
        }
        body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .page-wrap { max-width: 980px; margin: 0 auto; padding: 3rem 1.5rem; }
        header { margin-bottom: 2rem; }
        .hero-line em { font-style: normal; color: var(--accent); }
        .tabs { display: flex; background: var(--surface); border-radius: 999px; padding: 5px; width: fit-content; margin-bottom: 2rem; }
        .tab-btn { background: none; border: none; color: var(--text2); padding: 0.6rem 1.4rem; border-radius: 999px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--accent); color: white; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.6rem; margin-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.85rem; }
        .field label { display: block; font-size: 0.7rem; color: var(--text3); text-transform: uppercase; margin-bottom: 0.4rem; font-weight: 700; }
        .field input, .field select { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem; color: var(--text); outline: none; }
        .predict-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        #result { display: none; background: var(--surface2); border-radius: var(--radius); padding: 2rem; text-align: center; margin-top: 1rem; }
        .risk-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 999px; height: 8px; max-width: 320px; margin: 1rem auto; overflow: hidden; }
        .risk-bar-fill { height: 100%; transition: width 0.8s; }
        .chip { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
        .chip.leave { background: var(--red-dim); color: var(--red); }
        .chip.stay { background: var(--green-dim); color: var(--green); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .loader-card { display: none; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
<div class="page-wrap">
    <header>
        <div class="logo">Attrition<span>IQ</span></div>
        <h1 class="hero-line">Predict who's about to <em>walk out.</em></h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('single')">👤 Single Employee</button>
        <button class="tab-btn" onclick="switchTab('batch')">📋 Batch Dataset</button>
    </div>

    <div id="tab-single" class="tab-content active">
        <div class="card">
            <div class="grid">
                <div class="field"><label>Age</label><input type="number" id="Age" value="35"></div>
                <div class="field"><label>Gender</label><select id="Gender"><option>Male</option><option>Female</option></select></div>
                <div class="field"><label>Marital Status</label><select id="MaritalStatus"><option>Single</option><option>Married</option><option>Divorced</option></select></div>
                <div class="field"><label>Education (1-5)</label><input type="number" id="Education" value="3"></div>
                <div class="field"><label>Education Field</label><select id="EducationField"><option>Life Sciences</option><option>Medical</option><option>Marketing</option><option>Technical Degree</option><option>Other</option></select></div>
                <div class="field"><label>Distance From Home</label><input type="number" id="DistanceFromHome" value="10"></div>
            </div>
        </div>

        <div class="card">
            <div class="grid">
                <div class="field"><label>Department</label><select id="Department"><option>Sales</option><option>Research & Development</option><option>Human Resources</option></select></div>
                <div class="field"><label>Job Role</label><select id="JobRole"><option>Sales Executive</option><option>Research Scientist</option><option>Laboratory Technician</option><option>Manager</option></select></div>
                <div class="field"><label>Job Level (1-5)</label><input type="number" id="JobLevel" value="2"></div>
                <div class="field"><label>Business Travel</label><select id="BusinessTravel"><option>Travel_Rarely</option><option>Travel_Frequently</option><option>Non-Travel</option></select></div>
                <div class="field"><label>OverTime</label><select id="OverTime"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                <div class="field"><label>Num Companies Worked</label><input type="number" id="NumCompaniesWorked" value="2"></div>
            </div>
        </div>

        <div class="card">
            <div class="grid">
                <div class="field"><label>Monthly Income ($)</label><input type="number" id="MonthlyIncome" value="5000"></div>
                <div class="field"><label>Daily Rate</label><input type="number" id="DailyRate" value="800"></div>
                <div class="field"><label>Hourly Rate</label><input type="number" id="HourlyRate" value="65"></div>
                <div class="field"><label>Monthly Rate</label><input type="number" id="MonthlyRate" value="15000"></div>
                <div class="field"><label>Percent Salary Hike</label><input type="number" id="PercentSalaryHike" value="13"></div>
                <div class="field"><label>Stock Option Level (0-3)</label><input type="number" id="StockOptionLevel" value="1"></div>
            </div>
        </div>

        <div class="card">
            <div class="grid-3">
                <div class="field"><label>Total Working Years</label><input type="number" id="TotalWorkingYears" value="10"></div>
                <div class="field"><label>Years at Company</label><input type="number" id="YearsAtCompany" value="5"></div>
                <div class="field"><label>Years in Current Role</label><input type="number" id="YearsInCurrentRole" value="3"></div>
                <div class="field"><label>Yrs Since Promotion</label><input type="number" id="YearsSinceLastPromotion" value="1"></div>
                <div class="field"><label>Yrs With Manager</label><input type="number" id="YearsWithCurrManager" value="3"></div>
                <div class="field"><label>Training Times/Year</label><input type="number" id="TrainingTimesLastYear" value="3"></div>
            </div>
        </div>

        <div class="card">
            <div class="grid-3">
                <div class="field"><label>Environment Sat.</label><input type="number" id="EnvironmentSatisfaction" value="3"></div>
                <div class="field"><label>Job Satisfaction</label><input type="number" id="JobSatisfaction" value="3"></div>
                <div class="field"><label>Job Involvement</label><input type="number" id="JobInvolvement" value="3"></div>
                <div class="field"><label>Relationship Sat.</label><input type="number" id="RelationshipSatisfaction" value="3"></div>
                <div class="field"><label>Work Life Balance</label><input type="number" id="WorkLifeBalance" value="3"></div>
                <div class="field"><label>Performance Rating</label><input type="number" id="PerformanceRating" value="3"></div>
            </div>
        </div>

        <button class="predict-btn" onclick="predictSingle()">ANALYZE RISK →</button>

        <div id="result">
            <div id="result-emoji" style="font-size:2.5rem"></div>
            <div class="result-verdict" id="verdict-text"></div>
            <p id="result-reason" style="color:var(--text2); font-size:0.9rem; margin-bottom:1rem"></p>
            <div class="risk-bar-wrap"><div class="risk-bar-fill" id="risk-bar"></div></div>
            <div id="risk-text"></div>
        </div>
    </div>

    <div id="tab-batch" class="tab-content">
        <div class="card">
            <div class="upload-zone">
                <input type="file" onchange="handleUpload(this)">
                <div style="font-size:2rem">📁</div>
                <p>Drop HR CSV here</p>
            </div>
        </div>
        <div class="loader-card" id="loader-card">
            <p>Analyzing dataset...</p>
        </div>
        <div id="batch-result" style="display:none">
            <div class="stats-grid" style="display:flex; gap:1rem; margin-bottom:1rem">
                <div class="stat-card">Total: <span id="stat-total"></span></div>
                <div class="stat-card">Leave: <span id="stat-leave" style="color:var(--red)"></span></div>
                <div class="stat-card">Stay: <span id="stat-stay" style="color:var(--green)"></span></div>
            </div>
            <div class="table-wrap" style="background:var(--surface); border-radius:10px; overflow:auto; max-height:400px">
                <table id="batch-table" style="width:100%">
                    <thead><tr id="result-header"></tr></thead>
                    <tbody id="batch-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id.includes(tab)));
    }

    async function predictSingle() {
        const fields = ['Age','Gender','MaritalStatus','Education','EducationField','Department','JobRole','JobLevel','MonthlyIncome','DailyRate','HourlyRate','MonthlyRate','PercentSalaryHike','StockOptionLevel','TotalWorkingYears','YearsAtCompany','YearsInCurrentRole','YearsSinceLastPromotion','YearsWithCurrManager','NumCompaniesWorked','TrainingTimesLastYear','DistanceFromHome','OverTime','BusinessTravel','EnvironmentSatisfaction','JobSatisfaction','JobInvolvement','RelationshipSatisfaction','WorkLifeBalance','PerformanceRating'];
        const data = {};
        fields.forEach(f => { data[f] = document.getElementById(f).value; });

        const res = await fetch('/predict_single', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const out = await res.json();
        
        document.getElementById('result').style.display = 'block';
        document.getElementById('verdict-text').textContent = out.prediction;
        document.getElementById('verdict-text').style.color = out.color === 'red' ? 'var(--red)' : 'var(--green)';
        document.getElementById('result-reason').textContent = out.reason || "";
        document.getElementById('risk-bar').style.width = out.risk;
        document.getElementById('risk-bar').style.background = out.color === 'red' ? 'var(--red)' : 'var(--green)';
        document.getElementById('risk-text').textContent = "Risk: " + out.risk;
        document.getElementById('result-emoji').textContent = out.color === 'red' ? '🚨' : '✅';
    }

    async function handleUpload(input) {
        const file = input.files[0];
        document.getElementById('loader-card').style.display = 'block';
        const fd = new FormData(); fd.append('file', file);
        const res = await fetch('/upload_and_predict', { method: 'POST', body: fd });
        const out = await res.json();

        document.getElementById('loader-card').style.display = 'none';
        document.getElementById('batch-result').style.display = 'block';
        document.getElementById('stat-total').innerText = out.total;
        document.getElementById('stat-leave').innerText = out.leaving;
        document.getElementById('stat-stay').innerText = out.staying;

        document.getElementById('result-header').innerHTML = out.columns.map(c => `<th>${c}</th>`).join('');
        document.getElementById('batch-table-body').innerHTML = out.results.map(r => `
            <tr>${out.columns.map(c => `<td>${c === 'Prediction' ? `<span class="chip ${r[c].includes('Leave')?'leave':'stay'}">${r[c]}</span>` : r[c]}</td>`).join('')}</tr>
        `).join('');
    }
</script>
</body>
</html>
