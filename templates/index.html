<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AttritionIQ — 100% Intelligent</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #07080d; --surface: #111527; --accent: #6378ff; --red: #ff4d6d; --green: #10d48e; --text: #e8ecff; }
        body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
        .page-wrap { max-width: 980px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 2rem; }
        .tab-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid var(--accent); background: none; color: white; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--accent); }
        .card { background: var(--surface); padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #8892b0; margin-bottom: 5px; font-weight: 700; }
        input, select { width: 100%; padding: 10px; background: #0d0f18; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        .predict-btn { width: 100%; padding: 1.2rem; background: var(--accent); border: none; color: white; font-weight: 800; border-radius: 8px; cursor: pointer; font-family: 'Syne'; margin-top: 10px; }
        #result, #batch-result { display: none; margin-top: 20px; text-align: center; padding: 2rem; border-radius: 12px; background: #161a2e; border: 2px solid #333; }
        .card-title { font-family: 'Syne'; font-size: 0.8rem; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; text-align: left; }
        th, td { padding: 10px; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .chip { padding: 4px 10px; border-radius: 10px; font-weight: 700; font-size: 0.7rem; }
        .chip.leave { background: rgba(255,77,109,0.2); color: var(--red); }
        .chip.stay { background: rgba(16,212,142,0.2); color: var(--green); }
    </style>
</head>
<body>
<div class="page-wrap">
    <h1 style="font-family:'Syne'; margin-bottom: 2rem;">Attrition<span>IQ</span></h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('single')">👤 Single Predictor</button>
        <button class="tab-btn" onclick="switchTab('batch')">📋 Batch Analysis</button>
    </div>

    <div id="tab-single" class="tab-content active">
        <div class="card">
            <div class="card-title">Personal & Education</div>
            <div class="grid">
                <div class="field"><label>Age</label><input type="number" id="Age" value="30"></div>
                <div class="field"><label>Gender</label><select id="Gender"><option>Male</option><option>Female</option></select></div>
                <div class="field"><label>Marital Status</label><select id="MaritalStatus"><option>Single</option><option>Married</option><option>Divorced</option></select></div>
                <div class="field"><label>Education</label>
                    <select id="Education">
                        <option value="1">High School</option><option value="2">Associate</option>
                        <option value="3" selected>Bachelor's Degree</option><option value="4">Master's</option><option value="5">Doctorate</option>
                    </select>
                </div>
                <div class="field"><label>Education Field</label><select id="EducationField"><option>Life Sciences</option><option>Medical</option><option>Marketing</option><option>Technical Degree</option><option>Other</option></select></div>
                <div class="field"><label>Distance from Home (km)</label><input type="number" id="DistanceFromHome" value="5"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Job & Compensation</div>
            <div class="grid">
                <div class="field"><label>Monthly Income ($)</label><input type="number" id="MonthlyIncome" value="5000"></div>
                <div class="field"><label>Daily Rate ($)</label><input type="number" id="DailyRate" value="800"></div>
                <div class="field"><label>Hourly Rate ($)</label><input type="number" id="HourlyRate" value="65"></div>
                <div class="field"><label>Monthly Rate ($)</label><input type="number" id="MonthlyRate" value="15000"></div>
                <div class="field"><label>Department</label><select id="Department"><option>Sales</option><option>Research & Development</option><option>Human Resources</option></select></div>
                <div class="field"><label>Job Role</label><select id="JobRole"><option>Manager</option><option>Sales Executive</option><option>Research Scientist</option><option>Laboratory Technician</option></select></div>
                <div class="field"><label>Overtime</label><select id="OverTime"><option>No</option><option>Yes</option></select></div>
                <div class="field"><label>Job Level</label><select id="JobLevel"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Tenure & History</div>
            <div class="grid-3">
                <div class="field"><label>Total Working Years</label><input type="number" id="TotalWorkingYears" value="10"></div>
                <div class="field"><label>Years at Company</label><input type="number" id="YearsAtCompany" value="5"></div>
                <div class="field"><label>Years in Current Role</label><input type="number" id="YearsInCurrentRole" value="3"></div>
                <div class="field"><label>Years Since Promotion</label><input type="number" id="YearsSinceLastPromotion" value="1"></div>
                <div class="field"><label>Years With Manager</label><input type="number" id="YearsWithCurrManager" value="3"></div>
                <div class="field"><label>Num Companies Worked</label><input type="number" id="NumCompaniesWorked" value="1"></div>
                <div class="field"><label>Percent Salary Hike</label><input type="number" id="PercentSalaryHike" value="12"></div>
                <div class="field"><label>Stock Option Level</label><input type="number" id="StockOptionLevel" value="1"></div>
                <div class="field"><label>Training Last Year</label><input type="number" id="TrainingTimesLastYear" value="2"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Engagement & Satisfaction</div>
            <div class="grid-3">
                <div class="field"><label>Job Satisfaction</label><select id="JobSatisfaction"><option value="1">Low</option><option value="2">Med</option><option value="3" selected>High</option><option value="4">Very High</option></select></div>
                <div class="field"><label>Environment Sat.</label><select id="EnvironmentSatisfaction"><option value="1">Low</option><option value="2">Med</option><option value="3" selected>High</option><option value="4">Very High</option></select></div>
                <div class="field"><label>Job Involvement</label><select id="JobInvolvement"><option value="1">Low</option><option value="2">Med</option><option value="3" selected>High</option><option value="4">Very High</option></select></div>
                <div class="field"><label>Work Life Balance</label><select id="WorkLifeBalance"><option value="1">Poor</option><option value="2">Fair</option><option value="3" selected>Good</option><option value="4">Excellent</option></select></div>
                <div class="field"><label>Performance Rating</label><select id="PerformanceRating"><option value="3" selected>Good</option><option value="4">Outstanding</option></select></div>
                <div class="field"><label>Relationship Sat.</label><select id="RelationshipSatisfaction"><option value="1">Low</option><option value="2">Med</option><option value="3" selected>High</option><option value="4">Very High</option></select></div>
                <div class="field" style="grid-column: span 3;"><label>Business Travel</label><select id="BusinessTravel"><option>Travel_Rarely</option><option>Travel_Frequently</option><option>Non-Travel</option></select></div>
            </div>
        </div>

        <button class="predict-btn" onclick="predictSingle()">ANALYZE RISK STATUS →</button>

        <div id="result">
            <h2 id="verdict-text"></h2>
            <p id="result-reason" style="color:var(--red); margin: 10px 0; font-weight:600;"></p>
            <div id="risk-text" style="font-family:'JetBrains Mono';"></div>
        </div>
    </div>

    <div id="tab-batch" class="tab-content">
        <div class="card">
            <div class="card-title">Dataset Analysis</div>
            <input type="file" id="csvFile" accept=".csv" onchange="handleUpload(this)">
        </div>
        <div id="batch-result">
            <div id="stat-summary" style="font-weight: 800; margin-bottom: 1rem;"></div>
            <table id="batch-table"></table>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id.includes(tab)));
    }

    async function predictSingle() {
        const fields = ['Age','Education','EducationField','MaritalStatus','Gender','MonthlyIncome','OverTime','DailyRate','HourlyRate','MonthlyRate','Department','JobRole','JobLevel','BusinessTravel','TotalWorkingYears','YearsAtCompany','YearsInCurrentRole','YearsSinceLastPromotion','YearsWithCurrManager','NumCompaniesWorked','PercentSalaryHike','StockOptionLevel','TrainingTimesLastYear','JobSatisfaction','EnvironmentSatisfaction','JobInvolvement','WorkLifeBalance','PerformanceRating','RelationshipSatisfaction','DistanceFromHome'];
        const data = {};
        fields.forEach(f => { const el = document.getElementById(f); if(el) data[f] = el.value; });

        const btn = document.querySelector('.predict-btn');
        btn.innerText = "ANALYZING..."; btn.disabled = true;

        try {
            const res = await fetch('/predict_single', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const out = await res.json();
            document.getElementById('result').style.display = 'block';
            document.getElementById('verdict-text').innerText = out.prediction;
            document.getElementById('verdict-text').style.color = out.color === 'red' ? 'var(--red)' : 'var(--green)';
            document.getElementById('result-reason').innerText = out.reason || "";
            document.getElementById('risk-text').innerText = "Prediction Probability: " + out.risk;
        } catch (e) { alert("Error connecting to server."); }
        finally { btn.innerText = "ANALYZE RISK STATUS →"; btn.disabled = false; }
    }

    async function handleUpload(input) {
        const fd = new FormData(); fd.append('file', input.files[0]);
        const res = await fetch('/upload_and_predict', { method: 'POST', body: fd });
        const out = await res.json();
        document.getElementById('batch-result').style.display = 'block';
        document.getElementById('stat-summary').innerText = `Total: ${out.total} | Leaving: ${out.leaving} | Staying: ${out.staying}`;
        let html = '<thead><tr>' + out.columns.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
        out.results.forEach(r => {
            html += '<tr>' + out.columns.map(c => `<td>${c === 'Prediction' ? `<span class="chip ${r[c].includes('Leave')?'leave':'stay'}">${r[c]}</span>` : r[c]}</td>`).join('') + '</tr>';
        });
        document.getElementById('batch-table').innerHTML = html + '</tbody>';
    }
</script>
</body>
</html>
