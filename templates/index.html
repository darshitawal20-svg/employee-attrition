<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttritionIQ — Employee Attrition Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS VARIABLES & RESET */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #07080d; --bg2: #0d0f18; --surface: #111527; --surface2: #161a2e;
            --border: rgba(99,120,255,0.12); --border2: rgba(99,120,255,0.22);
            --accent: #6378ff; --accent-glow: rgba(99,120,255,0.35);
            --green: #10d48e; --green-dim: rgba(16,212,142,0.12);
            --red: #ff4d6d; --red-dim: rgba(255,77,109,0.12);
            --text: #e8ecff; --text2: #8892b0; --text3: #4a5280;
            --radius: 16px; --radius-sm: 10px;
        }
        body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .page-wrap { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
        
        /* HEADER */
        header { margin-bottom: 3rem; animation: fadeUp 0.7s ease both; }
        .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--accent); }
        .hero-line { font-family: 'Syne', sans-serif; font-size: clamp(1.9rem, 5vw, 3rem); font-weight: 800; line-height: 1.1; margin-bottom: 0.75rem; }
        .hero-line em { font-style: normal; color: var(--accent); }

        /* TABS */
        .tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 5px; width: fit-content; margin-bottom: 2rem; }
        .tab-btn { background: none; border: none; color: var(--text2); padding: 0.6rem 1.5rem; border-radius: 999px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }

        /* CARDS & GRID */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.6rem; margin-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.85rem; }
        .field label { display: block; font-size: 0.7rem; color: var(--text3); text-transform: uppercase; margin-bottom: 0.4rem; font-weight: 700; }
        .field input, .field select { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.7rem; color: var(--text); outline: none; }
        
        /* BUTTONS */
        .predict-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: 0.2s; }
        .predict-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* RESULTS */
        #result { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; margin-top: 1rem; text-align: center; }
        .result-verdict { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .risk-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 999px; height: 10px; max-width: 400px; margin: 1rem auto; overflow: hidden; }
        .risk-bar-fill { height: 100%; width: 0%; transition: width 1s ease-in-out; }

        /* BATCH UPLOAD */
        .upload-zone { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 3rem; text-align: center; cursor: pointer; position: relative; }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .loader-card { display: none; padding: 2rem; text-align: center; background: var(--surface); border-radius: var(--radius); margin-top: 1rem; }
        
        /* STATS & TABLE */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--surface); padding: 1.5rem; border-radius: var(--radius-sm); text-align: center; border-bottom: 3px solid var(--accent); }
        .stat-num { font-size: 2rem; font-weight: 800; font-family: 'Syne'; }
        .table-wrap { background: var(--surface); border-radius: var(--radius-sm); overflow-x: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: var(--surface2); padding: 1rem; text-align: left; color: var(--text3); text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); }
        .chip { padding: 0.3rem 0.8rem; border-radius: 999px; font-weight: 700; font-size: 0.75rem; }
        .chip.leave { background: var(--red-dim); color: var(--red); }
        .chip.stay { background: var(--green-dim); color: var(--green); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="page-wrap">
    <header>
        <div class="logo">Attrition<span>IQ</span></div>
        <h1 class="hero-line">Predict your <em>workforce future.</em></h1>
        <p style="color:var(--text2)">Universal HR Analytics. Low income triggers instant departure flags.</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('single')">👤 Single Employee</button>
        <button class="tab-btn" onclick="switchTab('batch')">📋 Batch CSV</button>
    </div>

    <div id="tab-single" class="tab-content active">
        <div class="card">
            <div class="grid">
                <div class="field"><label>Monthly Income ($)</label><input type="number" id="MonthlyIncome" value="5000"></div>
                <div class="field"><label>OverTime</label><select id="OverTime"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                <div class="field"><label>Age</label><input type="number" id="Age" value="30"></div>
                <div class="field"><label>Total Working Years</label><input type="number" id="TotalWorkingYears" value="10"></div>
                <div class="field"><label>Distance From Home</label><input type="number" id="DistanceFromHome" value="2"></div>
                <div class="field"><label>Job Satisfaction (1-4)</label><input type="number" id="JobSatisfaction" value="3" max="4"></div>
            </div>
            <div style="display:none">
                <input type="hidden" id="Gender" value="Male">
                <input type="hidden" id="MaritalStatus" value="Single">
                <input type="hidden" id="Education" value="3">
                <input type="hidden" id="EducationField" value="Medical">
                <input type="hidden" id="Department" value="Research & Development">
                <input type="hidden" id="JobRole" value="Research Scientist">
                <input type="hidden" id="JobLevel" value="2">
                <input type="hidden" id="DailyRate" value="800">
                <input type="hidden" id="HourlyRate" value="65">
                <input type="hidden" id="MonthlyRate" value="15000">
                <input type="hidden" id="BusinessTravel" value="Travel_Rarely">
                <input type="hidden" id="NumCompaniesWorked" value="1">
                <input type="hidden" id="PercentSalaryHike" value="12">
                <input type="hidden" id="StockOptionLevel" value="1">
                <input type="hidden" id="YearsAtCompany" value="5">
                <input type="hidden" id="YearsInCurrentRole" value="2">
                <input type="hidden" id="YearsSinceLastPromotion" value="1">
                <input type="hidden" id="YearsWithCurrManager" value="3">
                <input type="hidden" id="TrainingTimesLastYear" value="2">
                <input type="hidden" id="EnvironmentSatisfaction" value="3">
                <input type="hidden" id="JobInvolvement" value="3">
                <input type="hidden" id="RelationshipSatisfaction" value="3">
                <input type="hidden" id="WorkLifeBalance" value="3">
                <input type="hidden" id="PerformanceRating" value="3">
            </div>
            <button class="predict-btn" onclick="predictSingle()">ANALYZE RISK →</button>
        </div>

        <div id="result">
            <div class="result-verdict" id="verdict-text"></div>
            <p id="result-reason" style="margin-bottom:1rem; font-size:0.9rem; color:var(--text2)"></p>
            <div class="risk-bar-wrap"><div class="risk-bar-fill" id="risk-bar"></div></div>
            <div style="font-family:'JetBrains Mono'" id="risk-text"></div>
        </div>
    </div>

    <div id="tab-batch" class="tab-content">
        <div class="card">
            <div class="upload-zone">
                <input type="file" id="csvFile" accept=".csv" onchange="handleUpload(this)">
                <div style="font-size:2rem; margin-bottom:1rem">📁</div>
                <div style="font-weight:700">Upload HR Dataset (CSV)</div>
                <p style="font-size:0.8rem; color:var(--text2)">Auto-mapping will handle different column names.</p>
            </div>
        </div>

        <div class="loader-card" id="loader-card">
            <div style="font-weight:700">Analyzing Batch Data...</div>
            <div class="risk-bar-wrap"><div class="risk-bar-fill" style="width:100%; background:var(--accent); opacity:0.3"></div></div>
        </div>

        <div id="batch-result" style="display:none">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Total</div></div>
                <div class="stat-card" style="border-color:var(--red)"><div class="stat-num" id="stat-leave" style="color:var(--red)">0</div><div class="stat-lbl">Leaving</div></div>
                <div class="stat-card" style="border-color:var(--green)"><div class="stat-num" id="stat-stay" style="color:var(--green)">0</div><div class="stat-lbl">Staying</div></div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr id="result-header"></tr></thead>
                    <tbody id="batch-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    async function predictSingle() {
        const fields = ['Age','Gender','MaritalStatus','Education','EducationField','Department','JobRole','JobLevel','MonthlyIncome','DailyRate','HourlyRate','MonthlyRate','PercentSalaryHike','StockOptionLevel','TotalWorkingYears','YearsAtCompany','YearsInCurrentRole','YearsSinceLastPromotion','YearsWithCurrManager','NumCompaniesWorked','TrainingTimesLastYear','DistanceFromHome','OverTime','BusinessTravel','EnvironmentSatisfaction','JobSatisfaction','JobInvolvement','RelationshipSatisfaction','WorkLifeBalance','PerformanceRating'];
        const data = {};
        fields.forEach(f => {
            const el = document.getElementById(f);
            data[f] = (el.tagName === 'SELECT') ? el.value : (isNaN(el.value) ? el.value : Number(el.value));
        });

        const btn = document.querySelector('.predict-btn');
        btn.disabled = true; btn.textContent = "ANALYZING...";

        const res = await fetch('/predict_single', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const out = await res.json();

        btn.disabled = false; btn.textContent = "ANALYZE RISK →";
        
        const resultDiv = document.getElementById('result');
        const verdict = document.getElementById('verdict-text');
        const bar = document.getElementById('risk-bar');
        
        resultDiv.style.display = 'block';
        verdict.textContent = out.prediction;
        verdict.style.color = out.color === 'red' ? 'var(--red)' : 'var(--green)';
        document.getElementById('result-reason').textContent = out.reason || "";
        document.getElementById('risk-text').textContent = "Risk Score: " + out.risk;
        
        bar.style.width = out.risk;
        bar.style.background = out.color === 'red' ? 'var(--red)' : 'var(--green)';
    }

    async function handleUpload(input) {
        const file = input.files[0]; if(!file) return;
        document.getElementById('loader-card').style.display = 'block';
        document.getElementById('batch-result').style.display = 'none';

        const fd = new FormData();
        fd.append('file', file);

        const res = await fetch('/upload_and_predict', { method: 'POST', body: fd });
        const out = await res.json();

        document.getElementById('loader-card').style.display = 'none';
        document.getElementById('batch-result').style.display = 'block';
        
        document.getElementById('stat-total').textContent = out.total;
        document.getElementById('stat-leave').textContent = out.leaving;
        document.getElementById('stat-stay').textContent = out.staying;

        // Header
        document.getElementById('result-header').innerHTML = '<th>#</th>' + out.columns.map(c => `<th>${c}</th>`).join('');
        
        // Body
        document.getElementById('batch-table-body').innerHTML = out.results.map((r, i) => {
            const isLeave = r.Prediction === 'Will Leave';
            const cells = out.columns.map(c => {
                if(c === 'Prediction') return `<td><span class="chip ${isLeave?'leave':'stay'}">${r[c]}</span></td>`;
                if(c === 'Attrition Risk %') return `<td>${r[c]}%</td>`;
                return `<td>${r[c]}</td>`;
            }).join('');
            return `<tr><td>${i+1}</td>${cells}</tr>`;
        }).join('');
    }
</script>
</body>
</html>
